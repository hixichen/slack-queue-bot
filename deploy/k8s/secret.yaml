# Secret for Slack tokens.
# Fill in the base64-encoded values below, then:
#   kubectl apply -f deploy/k8s/secret.yaml
#
# To encode:  echo -n 'xoxb-your-token' | base64
apiVersion: v1
kind: Secret
metadata:
  name: slack-queue-bot
  namespace: default
  labels:
    app: slack-queue-bot
type: Opaque
data:
  # base64-encoded values — replace before applying
  SLACK_BOT_TOKEN: eG94Yi1yZXBsYWNlLW1l   # xoxb-replace-me
  SLACK_APP_TOKEN: eGFwcC1yZXBsYWNlLW1l   # xapp-replace-me
